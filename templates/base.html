<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WorkPac Document to Markdown{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #00B097;
      --dark-green: #073A3D;
      --navy: #1B365D;
      --light-blue: #8DD2E5;
      --gold: #FEC553;
      --red: #EE2937;
      --teal-25: #D6EBE5;
      --ink: #0f1e1f;
      --muted: #5b6b6a;
      --border: #d9e2e0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Poppins", -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, var(--teal-25) 0%, #f6faf9 45%, #ffffff 100%);
      min-height: 100vh;
    }
    header {
      background: var(--dark-green);
      color: #fff;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .mark {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--teal);
      display: grid; place-items: center;
      font-weight: 600; color: var(--dark-green);
    }
    header .brand { font-weight: 600; letter-spacing: .2px; font-size: 1.05rem; }
    header .brand small { display: block; font-weight: 400; opacity: .8; font-size: .72rem; }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }
    h1 {
      font-family: "DM Serif Display", Georgia, serif;
      color: var(--dark-green);
      font-size: 2.1rem;
      margin: 0 0 6px;
      font-weight: 400;
    }
    .lede { color: var(--muted); margin: 0 0 28px; font-size: 1rem; }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(7, 58, 61, .06);
    }
    .btn {
      appearance: none; border: 0; cursor: pointer;
      font-family: inherit; font-weight: 600; font-size: .95rem;
      background: var(--teal); color: #fff;
      padding: 12px 22px; border-radius: 10px;
      transition: background .15s ease, transform .05s ease;
    }
    .btn:hover { background: #009a84; }
    .btn:active { transform: translateY(1px); }
    .btn.secondary { background: var(--navy); }
    .btn.secondary:hover { background: #16294a; }
    .btn.ghost { background: transparent; color: var(--dark-green); border: 1px solid var(--border); }
    .btn.ghost:hover { background: var(--teal-25); }
    .error {
      background: #fdeced; border: 1px solid #f6b6bc; color: #a01722;
      padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: .92rem;
    }
    .hint { color: var(--muted); font-size: .82rem; margin-top: 14px; line-height: 1.5; }
    footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 8px 0 32px; }
    footer .gm { color: var(--teal); font-weight: 600; }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <div class="mark">W</div>
    <div class="brand">WorkPac
      <small>A Tasmea Company · Good Move</small>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    Powered by <strong>MarkItDown</strong> · Handle candidate &amp; client data per the Australian Privacy Principles
    · <span class="gm">Good Move</span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
